<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blomigenkänning AI</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<style>

body{
font-family: "Segoe UI", Arial, sans-serif;
background: linear-gradient(135deg,#6dd5ed,#2193b0);
margin:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:#333;
}

.container{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
max-width:600px;
width:90%;
text-align:center;
}

h1{
margin-top:0;
color:#2193b0;
}

.author{
font-weight:bold;
margin-bottom:20px;
}

.status{
padding:10px;
border-radius:8px;
margin-bottom:20px;
font-weight:bold;
}

.loading{
background:#fff3cd;
color:#856404;
}

.ready{
background:#d4edda;
color:#155724;
}

.error{
background:#f8d7da;
color:#721c24;
}

input[type=file]{
margin:20px 0;
}

img{
max-width:100%;
margin-top:15px;
border-radius:10px;
}

.result{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

.prob{
font-size:16px;
color:#555;
}

footer{
margin-top:25px;
font-size:14px;
color:#777;
}

</style>
</head>

<body>

<div class="container">

<h1>🌸 Blomigenkänning med AI</h1>

<div class="author">
Tilde G – Klass NA23A
</div>

<div id="status" class="status loading">
Laddar AI-modell...
</div>

<input type="file" id="imageUpload" accept="image/*">

<br>

<img id="preview"/>

<div id="result" class="result"></div>
<div id="prob" class="prob"></div>

<footer>
Ladda upp en bild på en blomma så försöker AI-modellen känna igen den.
</footer>

</div>

<script>

let model;

const statusBox = document.getElementById("status");

const classes = [
"Blomma 1",
"Blomma 2",
"Blomma 3",
"Blomma 4",
"Blomma 5"
];

async function loadModel(){

try{

model = await tf.loadLayersModel("./tfjs_model/model.json");

statusBox.innerText = "✅ Modellen är laddad och redo!";
statusBox.className = "status ready";

}catch(err){

statusBox.innerText = "❌ Kunde inte ladda modellen.";
statusBox.className = "status error";

console.error(err);

}

}

loadModel();

document.getElementById("imageUpload").addEventListener("change", handleImage);

async function handleImage(event){

const file = event.target.files[0];

if(!file || !model) return;

const img = document.getElementById("preview");
img.src = URL.createObjectURL(file);

img.onload = async function(){

let tensor = tf.browser.fromPixels(img)
.resizeNearestNeighbor([224,224])
.toFloat()
.div(255.0)
.expandDims();

let prediction = model.predict(tensor);

let data = await prediction.data();

let max = Math.max(...data);
let index = data.indexOf(max);

document.getElementById("result").innerText =
"🌼 Prediktion: " + classes[index];

document.getElementById("prob").innerText =
"Sannolikhet: " + (max*100).toFixed(2) + "%";

}

}

</script>

</body>
</html>
